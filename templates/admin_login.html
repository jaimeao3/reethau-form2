<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Reethau</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background grid pattern */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Glow blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .blob-1 { width: 400px; height: 400px; background: #2563eb; top: -100px; left: -100px; }
    .blob-2 { width: 300px; height: 300px; background: #7c3aed; bottom: -80px; right: -80px; }

    .login-box {
      position: relative;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-box {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      box-shadow: 0 4px 16px rgba(37,99,235,0.4);
    }

    .login-logo h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: 1px; }
    .login-logo p  { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    .login-title {
      margin-bottom: 28px;
    }
    .login-title h2 { font-size: 24px; font-weight: 800; color: #f1f5f9; }
    .login-title p  { font-size: 13px; color: #64748b; margin-top: 6px; }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 14px;
      color: #f1f5f9;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
    }

    input::placeholder { color: #475569; }

    .error-msg {
      background: rgba(220,38,38,0.15);
      border: 1px solid rgba(220,38,38,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 18px;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: all .2s;
      box-shadow: 0 4px 14px rgba(37,99,235,0.35);
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37,99,235,0.45);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #475569;
      text-decoration: none;
      transition: color .2s;
    }
    .back-link:hover { color: #94a3b8; }

    .badge-admin {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(37,99,235,0.15);
      border: 1px solid rgba(37,99,235,0.3);
      color: #93c5fd;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-box">
    <div class="login-logo">
      <div class="logo-box">R</div>
      <div>
        <h1>REETHAU</h1>
        <p>Human Resources Information System</p>
      </div>
    </div>

    <div class="login-title">
      <div class="badge-admin">🔐 ADMIN ONLY</div>
      <h2>Masuk ke Dashboard</h2>
      <p>Halaman ini hanya dapat diakses oleh administrator.</p>
    </div>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Masukkan username" required autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Masukkan password" required />
      </div>
      <button type="submit" class="btn-login">🚀 Masuk ke Dashboard</button>
    </form>

    <a href="/" class="back-link">← Kembali ke Form Input</a>
  </div>
</body>
</html>
